apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-reader-deployment
  labels:
    app: udp-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-reader
  template:
    metadata:
      labels:
        app: udp-reader
    spec:
      containers:
      - name: python-listener
        image: your-registry/my-udp-image:latest # Replace with your actual image
        ports:
        - containerPort: 23229
          protocol: UDP # <-- Critical: Tells K8s to expect UDP traffic
---
apiVersion: v1
kind: Service
metadata:
  name: udp-reader-service
spec:
  selector:
    app: udp-reader
  type: NodePort # Allows local network access via your cluster nodes
  ports:
    - port: 23229
      targetPort: 23229
      nodePort: 32005 # Accessible from your local network at <Node-IP>:32005
      protocol: UDP # <-- Critical: Matches the deployment protocol